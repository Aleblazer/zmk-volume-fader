name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # net8.0-windows + WinForms must build on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ZmkVolumeFader/ZmkVolumeFader.csproj

      - name: Build
        run: dotnet build ZmkVolumeFader/ZmkVolumeFader.csproj -c Release --no-restore

      - name: Publish single-file Windows build
        if: github.event_name != 'pull_request'
        run: dotnet publish ZmkVolumeFader/ZmkVolumeFader.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o artifacts/publish

      - name: Create checksum
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: (Get-FileHash artifacts/publish/ZmkVolumeFader.exe -Algorithm SHA256).Hash.ToLower() + '  ZmkVolumeFader.exe' | Set-Content artifacts/publish/ZmkVolumeFader.exe.sha256

      - name: Upload Windows build
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ZmkVolumeFader-win-x64
          path: |
            artifacts/publish/ZmkVolumeFader.exe
            artifacts/publish/ZmkVolumeFader.exe.sha256
